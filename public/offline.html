<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Campus Board - Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: Arial, sans-serif;
      }
      main {
        width: min(88vw, 420px);
        border: 1px solid #dbeafe;
        border-radius: 12px;
        background: #fff;
        padding: 28px;
      }
      h1 { margin: 0 0 8px; font-size: 24px; }
      p { margin: 0; color: #475569; line-height: 1.7; }
    </style>
  </head>
  <body>
    <main>
      <h1>オフラインです</h1>
      <p>Campus Boardに接続できません。通信が戻ったら、もう一度開いてください。</p>
    </main>
  </body>
</html>
